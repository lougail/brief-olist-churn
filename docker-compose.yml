services:
  postgres:
    image: postgres:16
    container_name: olist-postgres
    environment:
      POSTGRES_DB: olist
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data:/data
      - ./01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  pgdata:
